<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Prerender/SSR will inject route-specific SEO tags here -->
    <!--helmet-title-->
    <!--helmet-meta-->
    <!--helmet-link-->
    <!--helmet-script-->

    <!-- Minimal baseline (fallback) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="format-detection" content="telephone=no" />
    
    <!-- Favicon and Icons -->
    <link rel="icon" type="image/png" href="/HeadsOnlyTransparent.png" />
    <link rel="apple-touch-icon" href="/HeadsOnlyTransparent.png" />
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#3B82F6" />
    <meta name="msapplication-TileColor" content="#3B82F6" />
    
    <!-- Preconnect for Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- DNS Prefetch -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />

    <!-- Structured Data for AI Search & Entity Definition -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://safepsy.com/#organization",
          "name": "SafePsy",
          "alternateName": "Dr. Safe",
          "url": "https://safepsy.com",
          "logo": "https://safepsy.com/Logotransparent.png",
          "description": "Privacy-first AI therapy platform providing mental wellness support through Dr. Safe, with blockchain-secured identity and user-controlled encryption.",
          "foundingDate": "2025",
          "sameAs": [
            "https://twitter.com/safepsy",
            "https://linkedin.com/company/safepsy",
            "https://github.com/safepsy",
            "https://www.instagram.com/safepsy/"
          ],
          "contactPoint": {
            "@type": "ContactPoint",
            "contactType": "customer support",
            "email": "support@safepsy.com",
            "availableLanguage": "English"
          },
          "areaServed": "Global",
          "knowsAbout": ["AI therapy", "Mental health support", "Privacy technology", "Blockchain identity"]
        },
        {
          "@type": "SoftwareApplication",
          "@id": "https://safepsy.com/#software",
          "name": "SafePsy",
          "alternateName": "Dr. Safe",
          "applicationCategory": "HealthApplication",
          "subCategory": "MentalHealthApplication",
          "operatingSystem": "Web, iOS, Android",
          "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "USD",
            "description": "Free during beta"
          },
          "featureList": "AI therapy chat, Blockchain digital identity, AES-256-GCM encryption, GDPR compliance, Guest mode, Wallet-based encrypted history",
          "isAccessibleForFree": true,
          "description": "SafePsy is a privacy-first AI therapy chatbot that provides secure mental wellness support through Dr. Safe. Users can talk without signing in, with optional wallet-based encryption for conversation history.",
          "aggregateRating": {
            "@type": "AggregateRating",
            "ratingValue": "4.8",
            "ratingCount": "1250",
            "bestRating": "5",
            "worstRating": "1"
          },
          "audience": {
            "@type": "Audience",
            "audienceType": "Individuals seeking mental wellness support, therapy between-session reflection"
          },
          "notRequired": "Account registration for guest mode"
        },
        {
          "@type": "WebSite",
          "@id": "https://safepsy.com/#website",
          "name": "SafePsy",
          "url": "https://safepsy.com",
          "publisher": {
            "$ref": "https://safepsy.com/#organization"
          },
          "inLanguage": "en",
          "potentialAction": {
            "@type": "SearchAction",
            "target": "https://safepsy.com/search?q={search_term_string}",
            "query-input": "required name=search_term_string"
          }
        }
      ]
    }
    </script>
  </head>
  <body class="light">
    <!-- Apply theme before React paints (matches ThemeContext). Avoids unstyled body until useEffect. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var dark =
            stored === 'dark' ||
            (!stored &&
              window.matchMedia &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.classList.toggle('dark', dark);
          document.body.classList.toggle('dark', dark);
          document.body.classList.toggle('light', !dark);
        } catch (_) {}
      })();
    </script>
    <!-- Skip to main content link for accessibility -->
    <a href="#main-content" class="skip-link" style="position: absolute; left: -9999px; z-index: 999; padding: 1em; background: #3B82F6; color: white; text-decoration: none;">
      Skip to main content
    </a>
    <script>
      // Make skip link visible on focus
      document.addEventListener('DOMContentLoaded', function() {
        const skipLink = document.querySelector('.skip-link');
        if (skipLink) {
          skipLink.addEventListener('focus', function() {
            this.style.left = '0';
          });
          skipLink.addEventListener('blur', function() {
            this.style.left = '-9999px';
          });
        }
      });
    </script>

    <div id="root"><!--app-html--></div>
    <script type="module" src="/src/entry-client.tsx"></script>
  </body>
</html>
