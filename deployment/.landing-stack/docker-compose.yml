name: safepsy-landing

services:
  db:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      # Default: Docker named volume. For Scaleway block storage, replace with a bind mount, e.g.:
      # - /mnt/scw-landing-app-system/postgres:/var/lib/postgresql/data
      - landing_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build:
      context: ../..
      dockerfile: deployment/landing-app.Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      PORT: "3001"
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL}
      SCALEWAY_SECRET_MANAGER_ENABLED: "false"
      SAFEPSY_LANDING_ONLY: "true"
      GOOGLE_SHEETS_ID: "1SgLzzBLluvvgF-k55jVC8Om8JxK6Ookyp-r6KXAL-D0"
      GOOGLE_SHEETS_TAB_NAME: "Subscriptions"
      GOOGLE_SHEETS_CREDENTIALS_FILE: "/run/secrets/google-sheets-sa.json"
    secrets:
      - google-sheets-sa.json
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    restart: unless-stopped

volumes:
  landing_pg:
  caddy_data:
  caddy_config:

secrets:
  google-sheets-sa.json:
    file: ./google-sheets-sa.json
