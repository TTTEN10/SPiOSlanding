# Landing stack: Postgres + Express API (waitlist/contact) + static web + Caddy TLS.
# Deployed by deployment/deploy-app.sh; local: deployment/run-local-landing.sh
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: safepsy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: safepsy
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safepsy -d safepsy"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3001"
    deploy:
      resources:
        limits:
          memory: 2G

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        APP_DOMAIN: ${APP_DOMAIN}
    restart: unless-stopped
    expose:
      - "3000"
    deploy:
      resources:
        limits:
          memory: 1G

  caddy:
    image: caddy:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - api
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  pgdata:
  caddy_data:
  caddy_config:
