name: Terraform Validation

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'infra/terraform/**'
      - '.github/workflows/terraform.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'infra/terraform/**'
      - '.github/workflows/terraform.yml'
  workflow_dispatch:

jobs:
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform/envs/prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: CI disk guard (stricter than production)
        uses: ./.github/actions/ci-disk-guard

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ~1.6

      - name: Terraform Format Check
        id: fmt
        working-directory: infra/terraform
        run: terraform fmt -check -recursive
        continue-on-error: false

      - name: Terraform Init
        id: init
        run: terraform init -backend=false

      - name: Terraform Validate
        id: validate
        run: terraform validate
        continue-on-error: false

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform/envs/prod
    # Only run plan on protected branches or when secrets are available
    if: |
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: CI disk guard (stricter than production)
        uses: ./.github/actions/ci-disk-guard

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ~1.6

      - name: Terraform Init
        id: init
        run: terraform init -backend=false

      - name: Terraform Plan (with mocked values)
        id: plan
        env:
          # Mock values for plan - these won't actually create resources
          TF_VAR_scaleway_access_key: ${{ secrets.SCALEWAY_ACCESS_KEY != '' && secrets.SCALEWAY_ACCESS_KEY || 'mock-access-key' }}
          TF_VAR_scaleway_secret_key: ${{ secrets.SCALEWAY_SECRET_KEY != '' && secrets.SCALEWAY_SECRET_KEY || 'mock-secret-key' }}
          TF_VAR_scaleway_project_id: ${{ secrets.SCALEWAY_PROJECT_ID != '' && secrets.SCALEWAY_PROJECT_ID || 'mock-project-id' }}
          TF_VAR_ai_service_enabled: "true"
          TF_VAR_ai_service_container_image: "mock-registry/mock-image"
        run: |
          terraform plan \
            -var="project_name=mock-project" \
            -var="environment=test" \
            -no-color \
            -out=tfplan
        continue-on-error: true

      - name: Terraform Plan Status
        if: steps.plan.outcome == 'failure'
        run: |
          echo "⚠️ Terraform plan failed (expected if secrets are not configured)"
          echo "This is acceptable - plan will work with real secrets in production"
          exit 0

