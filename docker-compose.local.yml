# Local development deployment with email retrieval
# Usage: docker compose -f docker-compose.local.yml up --build

name: safepsy-local

services:
  # PostgreSQL Database (using port 5433 to avoid conflict with Docker Desktop)
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: safepsy
      POSTGRES_PASSWORD: safepsy_local_dev_password_2026
      POSTGRES_DB: safepsy_dev
    volumes:
      - safepsy_pg_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safepsy -d safepsy_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # MailHog - Email retrieval for development
  # Access web UI at http://localhost:8081
  # SMTP server listens on port 1026
  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1026:1025"  # SMTP server
      - "8081:8080"  # Web UI
    restart: unless-stopped

  # Backend API
  api:
    build:
      context: .
      dockerfile: deployment/landing-app.Dockerfile
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://safepsy:safepsy_local_dev_password_2026@db:5432/safepsy_dev
      FRONTEND_URL: http://localhost:3000
      ENABLE_CONFIRMATION_EMAIL: "true"
      EMAIL_PROVIDER: stub
      EMAIL_FROM_ADDRESS: noreply@safepsy.com
      GOOGLE_SHEETS_ID: 1SgLzzBLluvvgF-k55jVC8Om8JxK6Ookyp-r6KXAL-D0
      GOOGLE_SHEETS_TAB_NAME: Subscriptions
      GOOGLE_SHEETS_CREDENTIALS_FILE: /run/secrets/google-sheets-sa.json
      SAFEPSY_LANDING_ONLY: "true"
      IP_HASHING_ENABLED: "false"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./apps/api/schema.prisma:/app/apps/api/schema.prisma
    secrets:
      - google-sheets-sa.json
    restart: unless-stopped

  # Frontend (Vite dev server would be separate, but we serve built assets)
  frontend:
    image: nginx:alpine
    volumes:
      - ./apps/web/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  safepsy_pg_data:

secrets:
  google-sheets-sa.json:
    file: ./apps/api/.env.google-sheets.json
