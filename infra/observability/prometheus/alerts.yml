groups:
  - name: safepsy_alerts
    interval: 30s
    rules:
      # API Health Checks
      - alert: APIDown
        expr: up{job="safepsy-api"} == 0
        for: 1m
        labels:
          severity: critical
          component: api
        annotations:
          summary: "API is down"
          description: "The SafePsy API has been down for more than 1 minute."

      - alert: APIHighErrorRate
        expr: rate(http_requests_total{job="safepsy-api",status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
          component: api
        annotations:
          summary: "High API error rate"
          description: "API error rate is above 5% for 5 minutes."

      - alert: APIHighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="safepsy-api"}[5m])) > 2
        for: 10m
        labels:
          severity: warning
          component: api
        annotations:
          summary: "High API response time"
          description: "95th percentile API response time is above 2 seconds for 10 minutes."

      # Database Alerts
      - alert: DatabaseDown
        expr: up{job="postgres-exporter"} == 0
        for: 1m
        labels:
          severity: critical
          component: database
        annotations:
          summary: "Database exporter is down"
          description: "PostgreSQL exporter has been down for more than 1 minute."

      - alert: DatabaseHighConnections
        expr: pg_stat_database_numbackends{datname="safepsy_prod"} > 80
        for: 5m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "High database connections"
          description: "Database has more than 80 active connections for 5 minutes."

      - alert: DatabaseSlowQueries
        expr: rate(pg_stat_database_blk_read_time{datname="safepsy_prod"}[5m]) > 0.1
        for: 10m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "Slow database queries detected"
          description: "Database is experiencing slow queries for 10 minutes."

      # System Resource Alerts
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 10m
        labels:
          severity: warning
          component: system
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is above 80% for 10 minutes."

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 10m
        labels:
          severity: warning
          component: system
        annotations:
          summary: "High memory usage"
          description: "Memory usage is above 85% for 10 minutes."

      # CI/CD (GitHub Actions) enforces a higher floor via .github/actions/ci-disk-guard
      # (default 20% free after cleanup) so runners fail before approaching this threshold.
      - alert: LowDiskSpace
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 15
        for: 5m
        labels:
          severity: critical
          component: system
        annotations:
          summary: "Low disk space"
          description: "Disk space is below 15% on root filesystem."

      # Container Alerts
      - alert: ContainerHighCPU
        expr: rate(container_cpu_usage_seconds_total{name=~"spglobalv1-landing.*"}[5m]) * 100 > 80
        for: 10m
        labels:
          severity: warning
          component: container
        annotations:
          summary: "Container high CPU usage"
          description: "Application container CPU usage is above 80% for 10 minutes."

      - alert: ContainerHighMemory
        expr: (container_memory_usage_bytes{name=~"spglobalv1-landing.*"} / container_spec_memory_limit_bytes{name=~"spglobalv1-landing.*"}) * 100 > 90
        for: 10m
        labels:
          severity: warning
          component: container
        annotations:
          summary: "Container high memory usage"
          description: "Application container memory usage is above 90% for 10 minutes."

      - alert: ContainerRestart
        expr: rate(container_start_time_seconds{name=~"spglobalv1-landing.*"}[5m]) > 0
        for: 0m
        labels:
          severity: warning
          component: container
        annotations:
          summary: "Container restarted"
          description: "Application container has restarted."

      # Application-Specific Alerts
      - alert: HighSubscriptionRate
        expr: rate(email_subscriptions_total[5m]) > 10
        for: 5m
        labels:
          severity: info
          component: application
        annotations:
          summary: "High subscription rate"
          description: "Email subscription rate is above 10 per minute for 5 minutes."

      - alert: DatabaseConnectionPoolExhausted
        expr: pg_stat_database_numbackends{datname="safepsy_prod"} >= 100
        for: 2m
        labels:
          severity: critical
          component: database
        annotations:
          summary: "Database connection pool exhausted"
          description: "Database connection pool is at maximum capacity."

